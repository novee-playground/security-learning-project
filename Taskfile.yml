version: '3'

vars:
  AWS_REGION: us-east-1
  AWS_PROFILE: '{{.AWS_PROFILE | default "novee-infra"}}'
  REGISTRY: 208760706591.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_REPO: japanese-app
  CHART_REPO: helm/japanese-app
  CHART_NAME: japanese-app
  CHART_DIR: helm/japanese-app
  TAG: '{{.TAG | default "latest"}}'

env:
  AWS_PROFILE: '{{.AWS_PROFILE}}'

tasks:
  default:
    cmds:
      - task --list

  ecr-login:
    desc: Authenticate docker to ECR
    cmds:
      - aws ecr get-login-password --region {{.AWS_REGION}} | docker login --username AWS --password-stdin {{.REGISTRY}}

  ecr-login-helm:
    desc: Authenticate helm to ECR (OCI)
    cmds:
      - aws ecr get-login-password --region {{.AWS_REGION}} | helm registry login --username AWS --password-stdin {{.REGISTRY}}

  build:backend:
    desc: Build backend image
    dir: vulnerable-app/backend
    cmds:
      - docker build --platform linux/amd64 -t {{.REGISTRY}}/{{.IMAGE_REPO}}/backend:{{.TAG}} .

  build:frontend:
    desc: Build frontend image
    dir: vulnerable-app/frontend
    cmds:
      - docker build --platform linux/amd64 -t {{.REGISTRY}}/{{.IMAGE_REPO}}/frontend:{{.TAG}} .

  build:
    desc: Build both images
    deps: [build:backend, build:frontend]

  push:backend:
    desc: Push backend image
    deps: [ecr-login]
    cmds:
      - docker push {{.REGISTRY}}/{{.IMAGE_REPO}}/backend:{{.TAG}}

  push:frontend:
    desc: Push frontend image
    deps: [ecr-login]
    cmds:
      - docker push {{.REGISTRY}}/{{.IMAGE_REPO}}/frontend:{{.TAG}}

  push:
    desc: Push both images
    cmds:
      - task: push:backend
      - task: push:frontend

  release:
    desc: Build and push both images
    cmds:
      - task: build
      - task: push

  helm:lint:
    desc: Lint the helm chart
    cmds:
      - helm lint {{.CHART_DIR}}

  helm:package:
    desc: Package the helm chart into ./dist
    cmds:
      - mkdir -p dist
      - helm package {{.CHART_DIR}} --destination dist

  helm:push:
    desc: Push the packaged helm chart to ECR (OCI)
    deps: [ecr-login-helm]
    cmds:
      - |
        VERSION=$(helm show chart {{.CHART_DIR}} | awk '/^version:/ {print $2}')
        helm push dist/{{.CHART_NAME}}-${VERSION}.tgz oci://{{.REGISTRY}}/helm

  helm:release:
    desc: Lint, package, and push the helm chart
    cmds:
      - task: helm:lint
      - task: helm:package
      - task: helm:push
